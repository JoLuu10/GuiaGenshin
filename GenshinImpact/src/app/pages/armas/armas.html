<h2 class="titulo">Armas</h2>

<div class="grid">
  <div class="card" *ngFor="let a of armas">
    <div class="card-content">
      <h3>{{ a.nombre }}</h3>
      <p>{{ a.tipo }}</p>

      <div class="estrellas">
        <span *ngFor="let star of [].constructor(a.rareza)">⭐</span>
      </div>
    </div>
  </div>
</div>
